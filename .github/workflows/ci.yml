name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "22"
          cache: maven

      - name: Run tests
        run: ./mvnw verify

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --pull --tag tg-bot-gpt:ci .

  flyway-clean-db:
    name: Flyway Clean DB
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: tgbotgpt
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tgbotgpt"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Flyway migrations on a clean PostgreSQL database
        run: |
          docker run --rm --network host \
            -v "$PWD/src/main/resources/db/migration:/flyway/sql:ro" \
            flyway/flyway:10-alpine \
            -url=jdbc:postgresql://localhost:5432/tgbotgpt \
            -user=postgres \
            -password=postgres \
            -connectRetries=10 \
            migrate info

  release:
    name: Release
    runs-on: ubuntu-latest
    needs:
      - test
      - docker-build
      - flyway-clean-db
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "22"
          cache: maven

      - name: Build release jar
        run: ./mvnw -DskipTests package

      - name: Prepare release notes
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          awk -v version="$VERSION" '
            $0 ~ "^## \\[" version "\\]" { capture = 1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "CHANGELOG.md does not contain a non-empty ## [$VERSION] section." >&2
            exit 1
          fi

      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" --notes-file release-notes.md
            gh release upload "$TAG_NAME" target/Tg-Bot-Gpt-*.jar --clobber
            gh release upload "$TAG_NAME" CHANGELOG.md --clobber
          else
            gh release create "$TAG_NAME" target/Tg-Bot-Gpt-*.jar CHANGELOG.md --title "$TAG_NAME" --notes-file release-notes.md
          fi
