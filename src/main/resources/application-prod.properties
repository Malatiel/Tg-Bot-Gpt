# Production profile. Schema is owned by Flyway migrations.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=${SPRING_FLYWAY_BASELINE_ON_MIGRATE:false}

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# In containers, log to stdout — Docker/k8s log drivers expect it.
# File logging is left empty so Spring Boot uses the console appender only.
logging.file.name=
logging.file.path=

# Graceful shutdown for Boot's HTTP server. The executor inside TelegramBotService
# also honors bot.shutdown.timeout.seconds via @PreDestroy.
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

encryption.required=${ENCRYPTION_REQUIRED:true}
