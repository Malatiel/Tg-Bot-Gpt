spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.show_sql=false
spring.flyway.enabled=false
spring.main.banner-mode=off
spring.main.log-startup-info=false
debug=false
logging.level.root=WARN
logging.level.org.springframework=ERROR
logging.level.org.springframework.boot.SpringApplication=OFF
logging.level.org.springframework.boot.test.autoconfigure.jdbc=ERROR
logging.level.org.springframework.boot.autoconfigure=ERROR
logging.level.org.hibernate=ERROR
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF

bot.token=test-token
bot.name=TestBot
bot.presentation=Test
openai.apikey=test-key
openai.url=http://localhost
openai.model=gpt-4o-mini
openai.temperature=0.7
openai.maxtokens=100
openai.systemprompt=You are a test bot.
openai.max.message.pool.size=7
openai.allowed.models=gpt-4o-mini,gpt-4o,gpt-4-turbo
bot.rate.limit=10
bot.rate.window.seconds=60
bot.stream.enabled=false
bot.prompt.max.length=500
bot.image.max.size.mb=10
bot.image.allowed.types=image/jpeg,image/png,image/gif,image/webp
bot.whitelist=
encryption.key=
