spring.application.name=Tg-Bot-Gpt
spring.profiles.default=dev

bot.name=IndividualBotJava
bot.token=${BOT_TOKEN}
bot.presentation=Introduce yourself briefly and answer in Russian.
bot.whitelist=
bot.owner.ids=${BOT_OWNER_IDS:}

openai.apikey=${OPENAI_APIKEY}
openai.api.mode=${OPENAI_API_MODE:responses}
openai.url=https://api.openai.com/v1/chat/completions
openai.responses.url=https://api.openai.com/v1/responses
openai.model=${OPENAI_MODEL:gpt-5.4-nano}
openai.temperature=0.7
openai.maxtokens=3000
openai.max.message.pool.size=7
openai.max.history.tokens=${OPENAI_MAX_HISTORY_TOKENS:2000}
openai.allowed.models=${OPENAI_ALLOWED_MODELS:gpt-5.4-nano,gpt-5.4-mini,gpt-4o-mini,gpt-4o}
openai.systemprompt=You are GPTbot, a helpful Telegram assistant. Answer in the language of the user's message. Be concise, accurate, and practical. Ask a brief clarifying question when the request is ambiguous. Do not claim abilities you do not have.

bot.rate.limit=10
bot.rate.window.seconds=60
bot.stream.enabled=true
bot.prompt.max.length=500
bot.document.max.size.mb=10
bot.document.max.text.chars=15000
bot.document.max.pages=50
bot.document.parse.timeout.seconds=30
bot.image.max.size.mb=10
bot.image.allowed.types=image/jpeg,image/png,image/gif,image/webp
bot.file.download.timeout.seconds=15
bot.history.retention.days=30
bot.history.cleanup.cron=0 0 3 * * *
bot.executor.threads=0
bot.executor.queue.size=128
bot.shutdown.timeout.seconds=30
bot.telegram.retry.max.backoff.ms=10000

openai.health.freshness.seconds=300

encryption.key=${ENCRYPTION_KEY:}
encryption.required=${ENCRYPTION_REQUIRED:false}

#logging.level.root=INFO
logging.level.org.springframework=ERROR
logging.level.tgBot.*=INFO
logging.file.name=GPTbot.log
logging.pattern.file=%d %p %c{1.} [%t] %m%n
logging.pattern.console=%d{HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n
spring.main.show-banner=true

management.endpoints.web.exposure.include=health,info,metrics
management.server.port=8081
management.server.address=127.0.0.1
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when_authorized
management.endpoint.health.status.order=down,out-of-service,degraded,up,unknown
